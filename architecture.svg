<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>108-Overload architecture diagram</title>
<desc>System architecture showing agent loop, FastAPI server, environment core with passive dynamics, hidden state, and grader pipeline</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
@keyframes flow { to { stroke-dashoffset: -24; } }
.flow-line { stroke-dasharray: 6 4; animation: flow 1.4s linear infinite; }
.flow-line-slow { stroke-dasharray: 6 4; animation: flow 2.2s linear infinite; }
.pulse-dot { animation: pulse 1.8s ease-in-out infinite; }
</style>
</defs>

<!-- Agent loop container -->
<rect x="20" y="20" width="640" height="100" rx="12" fill="#f5f5f0" stroke="#b4b2a9" stroke-width="0.5"/>
<text font-size="12" x="36" y="38" fill="#5f5e5a" font-family="sans-serif">Agent loop</text>

<!-- LLM Agent -->
<rect x="40" y="46" width="130" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="105" y="71" text-anchor="middle" fill="#3C3489" font-family="sans-serif">LLM Agent</text>
<text font-size="12" x="105" y="89" text-anchor="middle" fill="#534AB7" font-family="sans-serif">Qwen / frontier</text>

<!-- FastAPI -->
<rect x="260" y="46" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="71" text-anchor="middle" fill="#085041" font-family="sans-serif">FastAPI server</text>
<text font-size="12" x="340" y="89" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">/reset /step /state /grader</text>

<!-- Action arrow -->
<line class="flow-line" x1="172" y1="68" x2="258" y2="68" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" x="215" y="62" text-anchor="middle" fill="#5f5e5a" font-family="sans-serif">action</text>

<!-- Observation arrow -->
<line class="flow-line-slow" x1="258" y1="88" x2="172" y2="88" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" x="215" y="103" text-anchor="middle" fill="#5f5e5a" font-family="sans-serif">observation</text>

<!-- Environment core container -->
<rect x="20" y="140" width="640" height="280" rx="12" fill="#f5f5f0" stroke="#b4b2a9" stroke-width="0.5" fill-opacity="0.5"/>
<text font-size="12" x="36" y="160" fill="#5f5e5a" font-family="sans-serif">Environment core — Overload108Env</text>

<!-- Passive dynamics -->
<rect x="40" y="172" width="184" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="132" y="194" text-anchor="middle" fill="#712B13" font-family="sans-serif">Passive dynamics</text>
<text font-size="12" x="132" y="212" text-anchor="middle" fill="#993C1D" font-family="sans-serif">fatigue +0.05 / step</text>
<text font-size="12" x="132" y="228" text-anchor="middle" fill="#993C1D" font-family="sans-serif">queue grows in surge</text>
<text font-size="12" x="132" y="244" text-anchor="middle" fill="#993C1D" font-family="sans-serif">cascade risk compounds</text>

<!-- Apply action -->
<rect x="260" y="172" width="160" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="194" text-anchor="middle" fill="#085041" font-family="sans-serif">_apply_action</text>
<text font-size="12" x="340" y="212" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">reward shaping</text>
<text font-size="12" x="340" y="228" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">state transitions</text>
<text font-size="12" x="340" y="244" text-anchor="middle" fill="#0F6E56" font-family="sans-serif">anti-exploit clamp</text>

<!-- Hidden state -->
<rect x="456" y="172" width="184" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="548" y="194" text-anchor="middle" fill="#633806" font-family="sans-serif">Hidden state</text>
<text font-size="12" x="548" y="212" text-anchor="middle" fill="#854F0B" font-family="sans-serif">true_severity</text>
<text font-size="12" x="548" y="228" text-anchor="middle" fill="#854F0B" font-family="sans-serif">≠ caller_severity</text>
<text font-size="12" x="548" y="244" text-anchor="middle" fill="#854F0B" font-family="sans-serif">±0.2 divergence</text>

<!-- Event injection -->
<rect x="148" y="308" width="196" height="88" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="246" y="328" text-anchor="middle" fill="#791F1F" font-family="sans-serif">Event injection</text>
<text font-size="12" x="246" y="346" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">every 4th step</text>
<text font-size="12" x="246" y="362" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">monsoon / festival</text>
<text font-size="12" x="246" y="378" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">power / mass casualty</text>
<circle class="pulse-dot" cx="330" cy="328" r="5" fill="#E24B4A"/>

<!-- District load -->
<rect x="376" y="308" width="264" height="88" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="508" y="328" text-anchor="middle" fill="#0C447C" font-family="sans-serif">District load balancing</text>
<text font-size="12" x="508" y="346" text-anchor="middle" fill="#185FA5" font-family="sans-serif">north/south/east/west/central</text>
<text font-size="12" x="508" y="362" text-anchor="middle" fill="#185FA5" font-family="sans-serif">drifts ±0.05 per step</text>
<text font-size="12" x="508" y="378" text-anchor="middle" fill="#185FA5" font-family="sans-serif">+0.10 reward if highest load</text>

<!-- Internal connecting arrows -->
<line x1="224" y1="222" x2="258" y2="222" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="420" y1="222" x2="454" y2="222" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="310" y1="272" x2="270" y2="308" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="420" y1="272" x2="450" y2="308" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<path d="M340 102 L340 170" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Grader pipeline container -->
<rect x="20" y="440" width="640" height="148" rx="12" fill="#f5f5f0" stroke="#b4b2a9" stroke-width="0.5" fill-opacity="0.5"/>
<text font-size="12" x="36" y="458" fill="#5f5e5a" font-family="sans-serif">Grader pipeline</text>

<!-- EASY grader -->
<rect x="40" y="468" width="170" height="100" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="125" y="490" text-anchor="middle" fill="#27500A" font-family="sans-serif">EASY grader</text>
<text font-size="12" x="125" y="508" text-anchor="middle" fill="#3B6D11" font-family="sans-serif">4 binary × 0.25</text>
<text font-size="12" x="125" y="524" text-anchor="middle" fill="#3B6D11" font-family="sans-serif">threshold: 0.50</text>
<text font-size="12" x="125" y="540" text-anchor="middle" fill="#3B6D11" font-family="sans-serif">8 steps</text>

<!-- MEDIUM grader -->
<rect x="254" y="468" width="172" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="340" y="490" text-anchor="middle" fill="#633806" font-family="sans-serif">MEDIUM grader</text>
<text font-size="12" x="340" y="508" text-anchor="middle" fill="#854F0B" font-family="sans-serif">5 binary × 0.20</text>
<text font-size="12" x="340" y="524" text-anchor="middle" fill="#854F0B" font-family="sans-serif">threshold: 0.62</text>
<text font-size="12" x="340" y="540" text-anchor="middle" fill="#854F0B" font-family="sans-serif">15 steps</text>

<!-- HARD grader -->
<rect x="470" y="468" width="170" height="100" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" x="555" y="490" text-anchor="middle" fill="#791F1F" font-family="sans-serif">HARD grader</text>
<text font-size="12" x="555" y="508" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">6 ratio-weighted</text>
<text font-size="12" x="555" y="524" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">anti-spam penalty</text>
<text font-size="12" x="555" y="540" text-anchor="middle" fill="#A32D2D" font-family="sans-serif">25 steps, 0.72</text>

<!-- Env → grader arrows -->
<line x1="132" y1="396" x2="132" y2="466" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<line x1="340" y1="396" x2="340" y2="466" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
<line x1="548" y1="396" x2="548" y2="466" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<!-- Score label -->
<text font-size="12" x="340" y="598" text-anchor="middle" fill="#5f5e5a" font-family="sans-serif">Scores clamped [0.01, 0.99] — breakdown dict exposed per criterion</text>
</svg>
